<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EmiDomi - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-bg">
  <div class="login-box">
    <!-- Logo -->
    <div class="logo">
      <img src="img/logo.png" alt="Logo EmiDomi">
    </div>

    <!-- Formulario -->
    <form id="loginForm">
      <input type="email" id="email" placeholder="Correo electrónico" required>
      <div class="password-field">
        <input type="password" id="password" placeholder="Contraseña" required>
      </div>
      <button type="submit">Iniciar sesión</button>
    </form>

    <!-- Links -->
    <div class="login-links">
      <a href="registro.html">Registrarse</a> | <a href="#">¿Olvidó la contraseña?</a>
    </div>

    <p id="loginMessage"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
