<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EmiDomi - Perfil</title>
  <link rel="stylesheet" href="perfil.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="perfil-container">

    <!-- ── Header azul ── -->
    <div class="perfil-header">
      <button class="btn-back" onclick="window.location.href='dashboard.html'">
  <i class="fa-solid fa-arrow-left"></i>
</button>

      <div class="perfil-info">
        <div class="avatar-wrapper">
          <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=120&h=120&fit=crop&crop=face" alt="Foto de perfil">
        </div>
        <div class="perfil-texto">
          <h2>Emmanuel Orozco</h2>
          <p>Emmaorozco93@gmail.com</p>
        </div>
      </div>

      <button class="btn-edit">
        <i class="fa-regular fa-pen-to-square"></i>
      </button>
    </div>

    <!-- ── Opciones ── -->
    <div class="perfil-opciones">

      <div class="opcion-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>Direcciones</span>
      </div>

      <div class="opcion-item">
        <i class="fa-regular fa-heart"></i>
        <span>Favoritos</span>
      </div>

      <div class="opcion-item">
        <i class="fa-solid fa-phone"></i>
        <span>Telefono-Celular</span>
      </div>

      <div class="opcion-item">
        <i class="fa-regular fa-envelope"></i>
        <span>Correo</span>
      </div>

    </div>

  </div>

  <script src="perfil.js"></script>
</body>
</html>
